name: Restrict PR to main

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Block PR if not from develop
        if: github.head_ref != 'develop'
        run: |
          echo "❌ PRs to main must come from develop. Source: ${{ github.head_ref }}"
          exit 1
      - name: Allow PR from develop
        run: echo "✅ Source branch is develop. Proceeding."